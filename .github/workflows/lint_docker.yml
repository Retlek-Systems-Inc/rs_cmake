name: Lint DockerFiles
on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - docker/**
      - .github/workflows/lint_docker.yml
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Find Dockerfile(s)
        id: find
        run: |
          echo "Dockerfiles to lint:"
          find . -name "Dockerfile" \
            -not -path "*/.git/*" \
            -not -path "*/.deps/*" \
            -not -path "*/build*"
      - name: Lint Dockerfile(s)
        uses: hadolint/hadolint-action@v3.3.0
        with:
          recursive: true